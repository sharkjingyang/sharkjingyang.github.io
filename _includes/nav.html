<!-- Navigation -->
<nav class="navbar navbar-default navbar-custom navbar-fixed-top">
    <div class="container-fluid">
        <!-- Brand and toggle get grouped for better mobile display -->
        <div class="navbar-header page-scroll">
            <button type="button" class="navbar-toggle">
                <span class="sr-only">Toggle navigation</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="{{ site.baseurl }}/">{{ site.title }}</a>
        </div>

        <!-- Collect the nav links, forms, and other content for toggling -->
        <div id="huxblog_navbar">
            <div class="navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li>
                        <a href="{{ site.baseurl }}/">Home</a>
                    </li>
                    <li>
                        <button class="theme-toggle" type="button" aria-label="Toggle color theme" title="Toggle color theme">
                            <i class="fa fa-moon-o" aria-hidden="true"></i>
                        </button>
                    </li>
                    <!-- <li>
                        <a href="https://docdro.id/jelJQ0h">CV</a>
                    </li>
                    <li>
                        <a href="https://docdro.id/oiPqwF2">GRADE</a>
                    </li> -->
                </ul>
            </div>
        </div>
        <!-- /.navbar-collapse -->
    </div>
    <!-- /.container -->
</nav>
<script>
    // Drop Bootstarp low-performance Navbar
    // Use customize navbar with high-quality material design animation
    // in high-perf jank-free CSS3 implementation
    var $body   = document.body;
    var $toggle = document.querySelector('.navbar-toggle');
    var $navbar = document.querySelector('#huxblog_navbar');
    var $collapse = document.querySelector('.navbar-collapse');
    var $themeToggle = document.querySelector('.theme-toggle');
    var $themeIcon = document.querySelector('.theme-toggle .fa');

    var __HuxTheme__ = {
        getStoredTheme: function(){
            try {
                return localStorage.getItem('theme');
            } catch (e) {
                return null;
            }
        },
        setStoredTheme: function(theme){
            try {
                localStorage.setItem('theme', theme);
            } catch (e) {}
        },
        prefersDark: function(){
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        },
        apply: function(theme){
            var useDark = theme === 'dark';
            if (useDark) {
                $body.classList.add('theme-dark');
            } else {
                $body.classList.remove('theme-dark');
            }
            if ($themeIcon) {
                $themeIcon.className = useDark ? 'fa fa-sun-o' : 'fa fa-moon-o';
            }
            if ($themeToggle) {
                $themeToggle.setAttribute('aria-label', useDark ? 'Switch to light mode' : 'Switch to dark mode');
                $themeToggle.setAttribute('title', useDark ? 'Switch to light mode' : 'Switch to dark mode');
            }
        },
        init: function(){
            var storedTheme = this.getStoredTheme();
            this.apply(storedTheme || (this.prefersDark() ? 'dark' : 'light'));
        },
        toggle: function(){
            var nextTheme = $body.classList.contains('theme-dark') ? 'light' : 'dark';
            this.apply(nextTheme);
            this.setStoredTheme(nextTheme);
        }
    }

    __HuxTheme__.init();

    var __HuxNav__ = {
        close: function(){
            $navbar.className = " ";
            // wait until animation end.
            setTimeout(function(){
                // prevent frequently toggle
                if($navbar.className.indexOf('in') < 0) {
                    $collapse.style.height = "0px"
                }
            },400)
        },
        open: function(){
            $collapse.style.height = "auto"
            $navbar.className += " in";
        }
    }

    // Bind Event
    $toggle.addEventListener('click', function(e){
        if ($navbar.className.indexOf('in') > 0) {
            __HuxNav__.close()
        }else{
            __HuxNav__.open()
        }
    })

    if ($themeToggle) {
        $themeToggle.addEventListener('click', function(e){
            __HuxTheme__.toggle();
        })
    }

    /**
     * Since Fastclick is used to delegate 'touchstart' globally
     * to hack 300ms delay in iOS by performing a fake 'click',
     * Using 'e.stopPropagation' to stop 'touchstart' event from 
     * $toggle/$collapse will break global delegation.
     * 
     * Instead, we use a 'e.target' filter to prevent handler
     * added to document close HuxNav.  
     *
     * Also, we use 'click' instead of 'touchstart' as compromise
     */
    document.addEventListener('click', function(e){
        if(e.target == $toggle) return;
        if(e.target.className == 'icon-bar') return;
        __HuxNav__.close();
    })
</script>
